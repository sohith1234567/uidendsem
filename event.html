<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>TechNova 2026 - Events</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <h1>TechNova 2026</h1>

        <nav>

            <a href="index.html">Home</a>

            <a href="events.html">Events</a>

            <a href="feedback.html">Feedback</a>

        </nav>

    </header>


    <!-- MAIN CONTENT -->

    <section class="container">


        <!-- EVENT IMAGES -->

        <h2>Featured Events</h2>

        <div class="events-gallery">

            <img src="images/contest.jpg"
                 alt="Coding Contest" width="300" height ="300">

            <img src="images/expo.jpg"
                 alt="Project Expo" width="300" height ="300">

            <img src="images/hack.jpg"
                 alt="Hackathon" width="300" height ="300">

            <img src="images/tech.jpg"
                 alt="Tech Quiz" width="300" height ="300">

            <img src="images/workshop.jpg"
                 alt="Workshop" width="300" height ="300">

        </div>


        <!-- EVENTS TABLE -->

        <h2>Events List</h2>

        <table class="events-table">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Date & Time</th>
                    <th>Venue</th>
                    <th>Max</th>
                    <th>Fee</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody id="eventsTableBody">

            </tbody>

        </table>


        <!-- REGISTRATION FORM -->

        <h2>Student Registration Form</h2>

        <form id="registrationForm" class="form-box">

            <label>Student Name:</label>

            <input type="text" id="studentName">

            <small class="error" id="nameError"></small>


            <label>Register Number:</label>

            <input type="text" id="registerNumber">

            <small class="error" id="regError"></small>


            <label>Email ID:</label>

            <input type="text" id="email">

            <small class="error" id="emailError"></small>


            <label>Mobile Number:</label>

            <input type="text" id="mobile">

            <small class="error" id="mobileError"></small>


            <label>Department:</label>

            <select id="department">

                <option value="">-- Select --</option>

                <option>CSE</option>

                <option>ECE</option>

                <option>EEE</option>

                <option>MECH</option>

                <option>CIVIL</option>

            </select>


            <label>Year of Study:</label>

            <select id="year">

                <option value="">-- Select --</option>

                <option>1</option>

                <option>2</option>

                <option>3</option>

                <option>4</option>

            </select>


            <label>Select Event:</label>

            <select id="eventSelect">

                <option value="">
                    -- Select Event --
                </option>

            </select>

            <small class="error" id="eventError"></small>


            <label>Participation Type:</label>

            <select id="participationType">

                <option value="Individual">
                    Individual
                </option>

                <option value="Team">
                    Team
                </option>

            </select>


            <div id="teamFields" class="hidden">

                <label>Team Name:</label>

                <input type="text" id="teamName">

                <small class="error"
                       id="teamError"></small>


                <label>
                    Number of Team Members:
                </label>

                <input type="number"
                       id="teamMembers"
                       min="2"
                       max="4">

                <small class="error"
                       id="teamMembersError"></small>

            </div>


            <button type="submit">
                Register
            </button>

            <p id="successMessage"
               class="success"></p>

        </form>


        <!-- REGISTERED PARTICIPANTS -->

        <h2>Registered Participants</h2>

        <p>

            <b>Total Registrations:</b>

            <span id="registrationCount">0</span>

        </p>


        <table class="events-table">

            <thead>

                <tr>

                    <th>Name</th>
                    <th>Reg No</th>
                    <th>Event</th>
                    <th>Type</th>
                    <th>Team Name</th>
                    <th>Members</th>

                </tr>

            </thead>

            <tbody id="registeredTableBody">

            </tbody>

        </table>

    </section>


    <!-- FOOTER -->

    <footer>

        <p>
            © 2026 TechNova |
            Events and Registration
        </p>

    </footer>


    <script src="script.js"></script>

</body>
</html>
